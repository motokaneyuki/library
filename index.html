<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mainContainer">
        <div class="header">
            <h1>My Library</h1>
            <button command="show-modal" commandfor="bookDialog" class="newBookButton">New Book</button>
            <dialog id="bookDialog">
                <form name="newBook">
                    <div class="topForm">
                        <div class="formTitle">Add New Book</div>
                        <button type="button" command="close" commandfor="bookDialog" class="closeButton">x</button>
                    </div>
                    <ul>
                        <li>
                            <label for="title">Title</label>
                            <input id="title" type="text" name="title">
                        </li>
                        <li>
                            <label for="author">Author</label>
                            <input id="author" type="text" name="author">
                        </li>
                        <li>
                            <label for="pages">Pages</label>
                            <input id="pages" type="text" name="pages">
                        </li>
                        <li>
                            <label for="read">Status</label>
                            <select id="read" name="Status">
                                <option value="Read">Read</option>
                                <option value="Reading">Reading</option>
                                <option value="Unread">Unread</option>
                            </select>
                        </li>
                    </ul>
                    <div class="submit">
                        <button type="submit" class="submitButton">Submit</button>
                    </div>
                </form>
            </dialog>
        </div>
        <div class="container"></div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
